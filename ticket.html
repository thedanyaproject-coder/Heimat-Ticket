<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Heimat Ticket PDF</title>

  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f7f2e8;
      color: #160520;
    }

    .wrap {
      width: 794px;
      margin: 0 auto;
      padding: 0;
    }

    .sheet {
      width: 794px;
      height: 1123px; /* A4 at 96dpi */
      background: #fffdf8;
      border: 2px solid #bdad82;
      position: relative;
      overflow: hidden;
      padding: 10px;
    }

    .sheet::before {
      content: "";
      position: absolute;
      inset: 10px;
      border: 1px solid #d7c79d;
      pointer-events: none;
    }

    .ticket-half {
      position: relative;
      z-index: 1;
      height: 534px;
      background: #ffffff;
      border: 1px solid #d7c79d;
      padding: 10px 12px 8px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .ticket-header {
      text-align: center;
      margin-bottom: 6px;
    }

    .ticket-house {
      font-size: 10px;
      letter-spacing: 4px;
      color: #7a6a48;
      text-transform: uppercase;
      margin-bottom: 4px;
      line-height: 1.1;
    }

    .ticket-title {
      font-size: 19px;
      font-weight: 700;
      letter-spacing: 1px;
      line-height: 1.05;
      margin: 0;
    }

    .ticket-sub {
      font-size: 11px;
      margin-top: 4px;
      line-height: 1.2;
    }

    .divider {
      width: 110px;
      height: 1px;
      background: #bdad82;
      margin: 8px auto 10px;
    }

    .ticket-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 7px;
      margin: 0;
    }

    .field-box {
      border: 1px solid #d7c79d;
      background: #fff;
      padding: 5px 7px;
      min-height: 66px;
    }

    .field-label {
      font-size: 9px;
      text-transform: uppercase;
      color: #7a6a48;
      margin-bottom: 4px;
      line-height: 1.1;
    }

    .field-value {
      font-size: 12px;
      font-weight: 700;
      line-height: 1.18;
      word-break: break-word;
    }

    .ticket-bottom {
      display: grid;
      grid-template-columns: 1fr 88px;
      gap: 10px;
      align-items: center;
      margin-top: 10px;
    }

    .ticket-number-box {
      border: 2px solid #bdad82;
      background: #fff;
      padding: 8px;
      text-align: center;
      min-height: 88px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .ticket-number-label {
      font-size: 9px;
      text-transform: uppercase;
      color: #7a6a48;
      margin-bottom: 4px;
      line-height: 1.1;
    }

    .ticket-number {
      font-size: 12px;
      font-weight: 700;
      line-height: 1.2;
      word-break: break-word;
    }

    .free-line {
      font-size: 10px;
      font-weight: 700;
      margin-top: 5px;
      line-height: 1.1;
    }

    .qr-wrap img {
      width: 88px;
      height: 88px;
      display: block;
      border: 1px solid #d7c79d;
      background: #fff;
      padding: 4px;
    }

    .ticket-notes {
      text-align: center;
      font-size: 9px;
      line-height: 1.22;
      margin-top: 7px;
      min-height: 24px;
    }

    .cut-line {
      position: relative;
      height: 25px;
      margin: 6px 0;
      border-top: 2px dashed #bdad82;
    }

    .cut-line span {
      position: absolute;
      left: 50%;
      top: -12px;
      transform: translateX(-50%);
      background: #fffdf8;
      padding: 0 8px;
      font-size: 15px;
      line-height: 1;
    }

    .actions {
      width: 794px;
      margin: 16px auto 24px;
      text-align: center;
    }

    button {
      padding: 10px 18px;
      border: none;
      background: #160520;
      color: #fff;
      cursor: pointer;
      font-size: 14px;
      font-weight: 700;
    }

    .message {
      width: 794px;
      margin: 30px auto;
      text-align: center;
      font-size: 16px;
    }

    @media print {
      body {
        background: #fff;
      }
      .actions {
        display: none;
      }
      .wrap {
        margin: 0;
      }
      .sheet {
        border: none;
      }
    }

    @media (max-width: 820px) {
      body {
        overflow-x: auto;
      }
      .wrap,
      .actions,
      .message {
        width: 794px;
      }
    }
  </style>
</head>
<body>
  <div id="app" class="message">Ticket wird geladen...</div>

  <script>
    (function () {
      const params = new URLSearchParams(window.location.search);
      const ticket = params.get("ticket");
      const autoPdf = params.get("pdf");
      const app = document.getElementById("app");

      function esc(value) {
        return String(value == null ? "" : value)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;");
      }

      function qr(url) {
        return "https://api.qrserver.com/v1/create-qr-code/?size=180x180&data=" + encodeURIComponent(url);
      }

      function buildTicket(data) {
        const url = "https://heimat-ticket.vercel.app/ticket.html?ticket=" + encodeURIComponent(data.ticket_number);

        function half() {
          return `
            <div class="ticket-half">
              <div>
                <div class="ticket-header">
                  <div class="ticket-house">Gasthaus Alt Grieth</div>
                  <div class="ticket-title">HEIMATLIEDER ABEND</div>
                  <div class="ticket-sub">Samstag · 6. Juni · 20:00 Uhr</div>
                </div>

                <div class="divider"></div>

                <div class="ticket-grid">
                  <div class="field-box">
                    <div class="field-label">Vorname</div>
                    <div class="field-value">${esc(data.first_name)}</div>
                  </div>
                  <div class="field-box">
                    <div class="field-label">Nachname</div>
                    <div class="field-value">${esc(data.last_name)}</div>
                  </div>
                  <div class="field-box">
                    <div class="field-label">E-Mail</div>
                    <div class="field-value">${esc(data.email)}</div>
                  </div>
                  <div class="field-box">
                    <div class="field-label">Telefon</div>
                    <div class="field-value">${esc(data.phone)}</div>
                  </div>
                  <div class="field-box">
                    <div class="field-label">Personen</div>
                    <div class="field-value">${esc(data.persons)}</div>
                  </div>
                  <div class="field-box">
                    <div class="field-label">Essen</div>
                    <div class="field-value">${esc(data.food)}</div>
                  </div>
                </div>
              </div>

              <div>
                <div class="ticket-bottom">
                  <div class="ticket-number-box">
                    <div class="ticket-number-label">Ticketnummer</div>
                    <div class="ticket-number">${esc(data.ticket_number)}</div>
                    <div class="free-line">EINTRITT FREI</div>
                  </div>

                  <div class="qr-wrap">
                    <img src="${qr(url)}" alt="QR Code">
                  </div>
                </div>

                <div class="ticket-notes">
                  Dieses Ticket sichert einen Sitzplatz an einem Tisch.<br>
                  Bitte bringen Sie dieses Ticket digital oder ausgedruckt mit.
                </div>
              </div>
            </div>
          `;
        }

        return `
          <div class="wrap">
            <div class="sheet" id="pdfSheet">
              ${half()}
              <div class="cut-line"><span>✂</span></div>
              ${half()}
            </div>
          </div>

          <div class="actions">
            <button id="pdfBtn">PDF herunterladen</button>
          </div>
        `;
      }

      function downloadPdf(filename) {
        const element = document.getElementById("pdfSheet");
        html2canvas(element, {
          scale: 2,
          useCORS: true,
          backgroundColor: "#ffffff"
        }).then(canvas => {
          const img = canvas.toDataURL("image/jpeg", 1);
          const pdf = new window.jspdf.jsPDF("p", "mm", "a4");
          pdf.addImage(img, "JPEG", 0, 0, 210, 297);
          pdf.save(filename + ".pdf");
        });
      }

      if (!ticket) {
        app.innerHTML = "Kein Ticket angegeben";
        return;
      }

      fetch("/api/lookup?ticket=" + encodeURIComponent(ticket))
        .then(r => r.json())
        .then(data => {
          if (!data || !data.success) {
            app.innerHTML = "Reservierung nicht gefunden";
            return;
          }

          app.className = "";
          app.innerHTML = buildTicket(data);

          document.getElementById("pdfBtn").addEventListener("click", function () {
            downloadPdf(data.ticket_number);
          });

          if (autoPdf === "1") {
            setTimeout(function () {
              downloadPdf(data.ticket_number);
            }, 500);
          }
        })
        .catch(() => {
          app.innerHTML = "Reservierung konnte nicht geladen werden";
        });
    })();
  </script>
</body>
</html>
