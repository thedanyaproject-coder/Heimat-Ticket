<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>

<style>
*{box-sizing:border-box;}

body{
margin:0;
font-family:Arial;
background:#f7f2e8;
}

/* ===== A4 ===== */
.sheet{
width:794px;
height:1123px;
margin:auto;
background:#fffdf8;
border:2px solid #bdad82;
position:relative;
}

/* 1cm marge */
.inner{
position:absolute;
inset:38px;
border:1px solid #d7c79d;
padding:14px;

display:grid;
grid-template-rows:1fr 30px 1fr;
}

/* ===== TICKET ===== */
.ticket{
display:flex;
flex-direction:column;
justify-content:space-between;
border:1px solid #d7c79d;
padding:12px;
background:#fff;
overflow:hidden; /* BELANGRIJK */
}

/* ===== HEADER ===== */
.header{text-align:center;}

.house{
font-size:10px;
letter-spacing:5px;
color:#8a7750;
}

.title{
font-size:26px;
font-weight:bold;
}

.sub{
font-size:12px;
}

.line{
width:120px;
height:1px;
background:#bdad82;
margin:10px auto;
}

/* ===== GRID ===== */
.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
}

.box{
border:1px solid #d7c79d;
padding:6px;
height:56px; /* lager */
}

.label{
font-size:10px;
color:#8a7750;
}

.value{
font-size:16px; /* groter */
font-weight:bold;
}

/* ===== BOTTOM ===== */
.bottom{
display:grid;
grid-template-columns:1fr 100px;
gap:10px;
margin-top:8px;
}

.number{
border:2px solid #bdad82;
padding:10px;
text-align:center;
}

.qr img{
width:100px;
height:100px;
}

.note{
text-align:center;
font-size:10px;
margin-top:6px;
line-height:1.2;
}

/* ===== CUT PERFECT ===== */
.cut{
border-top:3px dashed #bdad82;
position:relative;
}

.cut span{
position:absolute;
left:50%;
top:-16px;
transform:translateX(-50%);
font-size:30px;
background:#fffdf8;
}

/* ===== RESPONSIVE FIX ===== */
@media(max-width:900px){
.sheet{
transform:scale(0.6);
transform-origin:top center;
}
}
</style>
</head>

<body>

<div id="app">laden...</div>

<script>
(function(){

const params=new URLSearchParams(window.location.search);
const ticket=params.get("ticket");
const auto=params.get("pdf");

if(!ticket){
document.getElementById("app").innerHTML="kein ticket";
return;
}

fetch("/api/lookup?ticket="+ticket)
.then(r=>r.json())
.then(data=>{

const url="https://heimat-ticket.vercel.app/ticket.html?ticket="+data.ticket_number;

function qr(u){
return "https://api.qrserver.com/v1/create-qr-code/?size=200x200&data="+encodeURIComponent(u);
}

/* IDENTIEK BLOK */
function ticketBlock(){
return `
<div class="ticket">

<div>
<div class="header">
<div class="house">GASTHAUS ALT GRIETH</div>
<div class="title">HEIMATLIEDER ABEND</div>
<div class="sub">Samstag · 6. Juni · 20:00 Uhr</div>
</div>

<div class="line"></div>

<div class="grid">
<div class="box"><div class="label">Vorname</div><div class="value">${data.first_name}</div></div>
<div class="box"><div class="label">Nachname</div><div class="value">${data.last_name}</div></div>
<div class="box"><div class="label">E-Mail</div><div class="value">${data.email}</div></div>
<div class="box"><div class="label">Telefon</div><div class="value">${data.phone}</div></div>
<div class="box"><div class="label">Personen</div><div class="value">${data.persons}</div></div>
<div class="box"><div class="label">Essen</div><div class="value">${data.food}</div></div>
</div>
</div>

<div>
<div class="bottom">
<div class="number">
<div>TICKETNUMMER</div>
<div>${data.ticket_number}</div>
<div>EINTRITT FREI</div>
</div>

<div class="qr">
<img src="${qr(url)}">
</div>
</div>

<div class="note">
Dieses Ticket sichert einen Sitzplatz an einem Tisch.<br>
Bitte bringen Sie dieses Ticket digital oder ausgedruckt mit.
</div>
</div>

</div>
`;
}

document.getElementById("app").innerHTML=`
<div class="sheet" id="pdf">
<div class="inner">

${ticketBlock()}

<div class="cut"><span>✂</span></div>

${ticketBlock()}

</div>
</div>
`;

/* DIRECT DOWNLOAD */
html2canvas(document.getElementById("pdf"),{scale:2}).then(canvas=>{
const img=canvas.toDataURL("image/jpeg",1);
const pdf=new window.jspdf.jsPDF("p","mm","a4");
pdf.addImage(img,"JPEG",0,0,210,297);
pdf.save(data.ticket_number+".pdf");
});

});
})();
</script>

</body>
</html>
