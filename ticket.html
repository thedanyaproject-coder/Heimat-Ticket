<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Heimat Ticket PDF</title>

<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>

<style>
*{box-sizing:border-box;}

body{
margin:0;
font-family:Arial,sans-serif;
background:#f8f4ea;
color:#160520;
}

.wrap{
max-width:900px;
margin:auto;
padding:20px;
}

/* ===== TICKET ===== */

.sheet{
width:100%;
max-width:794px;
aspect-ratio:210/297;
margin:auto;
padding:16px;

background:
linear-gradient(rgba(255,251,242,0.94), rgba(255,251,242,0.94)),
url("https://i.postimg.cc/0yKq0kXr/rhein-soft.jpg");

background-size:cover;
border:2px solid #bdad82;
position:relative;
}

.sheet::before{
content:"";
position:absolute;
inset:10px;
border:1px solid #bdad82;
}

.ticket-half{
height:calc((100% - 30px)/2);
display:flex;
flex-direction:column;
justify-content:space-between;
padding:12px;
background:rgba(255,255,255,0.75);
}

.ticket-title{
text-align:center;
font-size:26px;
font-weight:bold;
letter-spacing:2px;
}

.ticket-sub{
text-align:center;
font-size:13px;
margin-bottom:10px;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:8px;
}

.box{
border:1px solid #bdad82;
padding:6px;
background:#fff;
}

.label{
font-size:10px;
color:#6a5a36;
}

.value{
font-size:14px;
font-weight:bold;
}

.bottom{
display:grid;
grid-template-columns:1fr 90px;
gap:10px;
margin-top:10px;
}

.number{
border:2px solid #bdad82;
padding:10px;
text-align:center;
font-weight:bold;
}

.qr img{
width:90px;
height:90px;
}

.cut{
border-top:2px dashed #bdad82;
margin:12px 0;
text-align:center;
}

/* ===== BUTTON ===== */

.actions{
text-align:center;
margin-top:20px;
}

button{
padding:10px 18px;
border:none;
background:#160520;
color:#fff;
cursor:pointer;
}

/* ===== MOBILE ===== */

@media(max-width:720px){
.ticket-title{font-size:20px;}
.value{font-size:12px;}
.qr img{width:70px;height:70px;}
}
</style>
</head>

<body>

<div class="wrap">
<div id="app">Ticket wird geladen...</div>
</div>

<script>
(function(){

const params=new URLSearchParams(window.location.search);
const ticket=params.get("ticket");
const autoPdf=params.get("pdf");

if(!ticket){
document.getElementById("app").innerHTML="Kein Ticket angegeben";
return;
}

fetch("/api/lookup?ticket="+ticket)
.then(r=>r.json())
.then(data=>{

if(!data.success){
document.getElementById("app").innerHTML="Reservierung nicht gefunden";
return;
}

function qr(url){
return "https://api.qrserver.com/v1/create-qr-code/?size=200x200&data="+encodeURIComponent(url);
}

const url="https://heimat-ticket.vercel.app/ticket.html?ticket="+data.ticket_number;

function block(id){
return `
<div class="ticket-half">

<div>
<div class="ticket-title">HEIMATLIEDER ABEND</div>
<div class="ticket-sub">6 JUNI · 20:00 UHR</div>

<div class="grid">
<div class="box"><div class="label">Vorname</div><div class="value">${data.first_name}</div></div>
<div class="box"><div class="label">Nachname</div><div class="value">${data.last_name}</div></div>
<div class="box"><div class="label">E-Mail</div><div class="value">${data.email}</div></div>
<div class="box"><div class="label">Telefon</div><div class="value">${data.phone}</div></div>
<div class="box"><div class="label">Personen</div><div class="value">${data.persons}</div></div>
<div class="box"><div class="label">Essen</div><div class="value">${data.food}</div></div>
</div>
</div>

<div class="bottom">
<div class="number">${data.ticket_number}</div>
<div class="qr"><img src="${qr(url)}"></div>
</div>

</div>
`;
}

document.getElementById("app").innerHTML=`
<div class="sheet" id="pdf">
${block("1")}
<div class="cut">✂</div>
${block("2")}
</div>

<div class="actions">
<button onclick="download()">PDF herunterladen</button>
</div>
`;

window.download=function(){
html2canvas(document.getElementById("pdf"),{scale:3}).then(canvas=>{
const img=canvas.toDataURL("image/jpeg",1);
const pdf=new window.jspdf.jsPDF("p","mm","a4");
pdf.addImage(img,"JPEG",10,10,190,277);
pdf.save(data.ticket_number+".pdf");
});
};

if(autoPdf==="1"){
setTimeout(download,700);
}

});

})();
</script>

</body>
</html>
