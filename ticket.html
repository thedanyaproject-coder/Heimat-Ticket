<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Heimat Ticket PDF</title>

<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>

<style>
*{box-sizing:border-box;}

body{
margin:0;
font-family:Arial,sans-serif;
background:#fffdf8;
color:#160520;
}

.wrap{
max-width:900px;
margin:auto;
padding:20px;
}

.sheet{
width:100%;
max-width:794px;
aspect-ratio:210/297;
margin:auto;
padding:14px;
background:
linear-gradient(rgba(255,251,242,0.96), rgba(255,251,242,0.96)),
url("https://i.postimg.cc/0yKq0kXr/rhein-soft.jpg");
background-size:cover;
background-position:center;
border:2px solid #bdad82;
position:relative;
overflow:hidden;
}

.sheet::before{
content:"";
position:absolute;
inset:10px;
border:1px solid rgba(189,173,130,0.95);
pointer-events:none;
}

.ticket-half{
height:calc((100% - 28px)/2);
display:flex;
flex-direction:column;
justify-content:space-between;
padding:10px;
background:rgba(255,255,255,0.78);
position:relative;
z-index:1;
}

.ticket-header{
text-align:center;
margin-bottom:8px;
}

.ticket-house{
font-size:11px;
letter-spacing:4px;
color:#7b6a48;
margin-bottom:6px;
text-transform:uppercase;
}

.ticket-title{
text-align:center;
font-size:22px;
font-weight:bold;
letter-spacing:2px;
line-height:1.1;
}

.ticket-sub{
text-align:center;
font-size:12px;
margin-top:4px;
margin-bottom:8px;
line-height:1.3;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:6px;
}

.box{
border:1px solid #bdad82;
padding:6px 7px;
background:#fff;
min-height:48px;
}

.label{
font-size:9px;
color:#6a5a36;
text-transform:uppercase;
margin-bottom:3px;
line-height:1.2;
}

.value{
font-size:12px;
font-weight:bold;
line-height:1.25;
word-break:break-word;
}

.bottom{
display:grid;
grid-template-columns:1fr 82px;
gap:8px;
align-items:center;
margin-top:8px;
}

.number{
border:2px solid #bdad82;
padding:8px;
text-align:center;
background:#fff;
}

.number-label{
font-size:9px;
color:#6a5a36;
text-transform:uppercase;
margin-bottom:4px;
}

.number-value{
font-size:13px;
font-weight:bold;
line-height:1.25;
word-break:break-word;
}

.free-line{
margin-top:5px;
font-size:10px;
font-weight:bold;
}

.qr img{
width:74px;
height:74px;
border:1px solid #bdad82;
background:#fff;
padding:4px;
display:block;
}

.ticket-notes{
text-align:center;
font-size:9px;
margin-top:7px;
line-height:1.3;
}

.cut{
border-top:2px dashed #bdad82;
margin:8px 0;
text-align:center;
position:relative;
height:8px;
}

.cut span{
position:absolute;
left:50%;
top:-11px;
transform:translateX(-50%);
background:#fffdf8;
padding:0 8px;
}

.actions{
text-align:center;
margin-top:20px;
}

button{
padding:10px 18px;
border:none;
background:#160520;
color:#fff;
cursor:pointer;
font-size:14px;
}

.message{
text-align:center;
padding:30px 20px;
font-size:16px;
}

@media(max-width:720px){
.wrap{padding:10px;}
.sheet{padding:10px;}
.ticket-half{padding:8px;}
.ticket-title{font-size:19px;}
.ticket-sub{font-size:11px;}
.value{font-size:11px;}
.number-value{font-size:12px;}
.qr img{width:68px;height:68px;}
.ticket-notes{font-size:8px;}
}
</style>
</head>

<body>
<div class="wrap">
  <div id="app">Ticket wird geladen...</div>
</div>

<script>
(function(){
const params = new URLSearchParams(window.location.search);
const ticket = params.get("ticket");
const autoPdf = params.get("pdf");

if(!ticket){
  document.getElementById("app").innerHTML = '<div class="message">Kein Ticket angegeben</div>';
  return;
}

fetch("/api/lookup?ticket=" + encodeURIComponent(ticket))
.then(r => r.json())
.then(data => {

  if(!data.success){
    document.getElementById("app").innerHTML = '<div class="message">Reservierung nicht gefunden</div>';
    return;
  }

  function qr(url){
    return "https://api.qrserver.com/v1/create-qr-code/?size=180x180&data=" + encodeURIComponent(url);
  }

  const url = "https://heimat-ticket.vercel.app/ticket.html?ticket=" + encodeURIComponent(data.ticket_number);

  function block(){
    return `
    <div class="ticket-half">
      <div>
        <div class="ticket-header">
          <div class="ticket-house">Gasthaus Alt Grieth</div>
          <div class="ticket-title">HEIMATLIEDER ABEND</div>
          <div class="ticket-sub">Samstag · 6. Juni · 20:00 Uhr</div>
        </div>

        <div class="grid">
          <div class="box"><div class="label">Vorname</div><div class="value">${data.first_name}</div></div>
          <div class="box"><div class="label">Nachname</div><div class="value">${data.last_name}</div></div>
          <div class="box"><div class="label">E-Mail</div><div class="value">${data.email}</div></div>
          <div class="box"><div class="label">Telefon</div><div class="value">${data.phone}</div></div>
          <div class="box"><div class="label">Personen</div><div class="value">${data.persons}</div></div>
          <div class="box"><div class="label">Essen</div><div class="value">${data.food}</div></div>
        </div>
      </div>

      <div>
        <div class="bottom">
          <div class="number">
            <div class="number-label">Ticketnummer</div>
            <div class="number-value">${data.ticket_number}</div>
            <div class="free-line">EINTRITT FREI</div>
          </div>
          <div class="qr">
            <img src="${qr(url)}" alt="QR Code">
          </div>
        </div>

        <div class="ticket-notes">
          Dieses Ticket sichert einen Sitzplatz an einem Tisch.<br>
          Bitte bringen Sie dieses Ticket digital oder ausgedruckt mit.
        </div>
      </div>
    </div>
    `;
  }

  document.getElementById("app").innerHTML = `
    <div class="sheet" id="pdf">
      ${block()}
      <div class="cut"><span>✂</span></div>
      ${block()}
    </div>

    <div class="actions">
      <button onclick="downloadPdf()">PDF herunterladen</button>
    </div>
  `;

  window.downloadPdf = function(){
    html2canvas(document.getElementById("pdf"), {
      scale: 2,
      useCORS: true,
      backgroundColor: "#ffffff"
    }).then(canvas => {
      const img = canvas.toDataURL("image/jpeg", 1);
      const pdf = new window.jspdf.jsPDF("p", "mm", "a4");
      pdf.addImage(img, "JPEG", 0, 0, 210, 297);
      pdf.save(data.ticket_number + ".pdf");
    });
  };

  if(autoPdf === "1"){
    setTimeout(window.downloadPdf, 700);
  }
})
.catch(() => {
  document.getElementById("app").innerHTML = '<div class="message">Reservierung konnte nicht geladen werden</div>';
});
})();
</script>

</body>
</html>
