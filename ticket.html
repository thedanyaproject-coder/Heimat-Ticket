<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ticket</title>

<script src="https://cdn.jsdelivr.net/npm/html2canvas"></script>
<script src="https://cdn.jsdelivr.net/npm/jspdf"></script>

<style>
body{font-family:Arial;background:#f7f2e8;margin:0;text-align:center}
.ticket{width:794px;height:1123px;margin:20px auto;background:white;padding:20px}
button{padding:10px;margin:10px}
</style>
</head>

<body>

<div id="app">laden...</div>

<script>

// 👉 redirect als via jouw domein binnenkomt
if(location.hostname.includes("altgrieth")){
const t=new URLSearchParams(location.search).get("ticket");
if(t){
location.href="https://heimat-ticket.vercel.app/ticket.html?ticket="+t;
}
}

const params=new URLSearchParams(location.search);
const ticket=params.get("ticket");

if(!ticket){
document.getElementById("app").innerHTML="kein ticket";
}else{

fetch("/api/lookup?ticket="+ticket)
.then(r=>r.json())
.then(data=>{

const publicUrl="https://www.altgrieth.de/heimat-tickets?ticket="+data.ticket_number;

document.getElementById("app").innerHTML=`
<button onclick="makePdf()">PDF downloaden</button>
<a href="https://www.altgrieth.de/heimat-tickets"><button>Terug</button></a>

<div class="ticket" id="pdf">
<h2>HEIMATLIEDER ABEND</h2>
<p>${data.first_name} ${data.last_name}</p>
<p>${data.persons} Personen</p>
<p>${data.ticket_number}</p>

<img src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${encodeURIComponent(publicUrl)}">
</div>
`;
});
}

function makePdf(){
html2canvas(document.getElementById("pdf")).then(canvas=>{
const pdf=new jspdf.jsPDF("p","mm","a4");
pdf.addImage(canvas.toDataURL(),"PNG",0,0,210,297);
pdf.save("ticket.pdf");
});
}

</script>

</body>
</html>
