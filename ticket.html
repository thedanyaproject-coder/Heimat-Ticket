<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Heimat Ticket PDF</title>

<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>

<style>
*{box-sizing:border-box;}

body{
margin:0;
font-family:Arial,sans-serif;
background:#f7f2e8;
color:#160520;
}

.wrap{
width:794px;
margin:0 auto;
padding:0;
}

.sheet{
width:794px;
height:1123px;
margin:0 auto;
background:#fffdf8;
border:2px solid #bdad82;
position:relative;
overflow:hidden;
}

.inner{
position:absolute;
left:38px;
right:38px;
top:38px;
bottom:38px;
border:1px solid #d7c79d;
padding:14px;
background:
linear-gradient(rgba(255,251,242,0.96), rgba(255,251,242,0.96)),
url("https://i.postimg.cc/0yKq0kXr/rhein-soft.jpg");
background-size:cover;
background-position:center;
display:grid;
grid-template-rows:1fr 34px 1fr;
}

.ticket-half{
background:#fff;
border:1px solid #d7c79d;
padding:12px 14px 10px;
display:flex;
flex-direction:column;
justify-content:space-between;
min-height:0;
overflow:hidden;
}

.ticket-header{text-align:center;margin-bottom:6px;}

.ticket-house{
font-size:10px;
letter-spacing:5px;
text-transform:uppercase;
color:#8a7750;
margin-bottom:5px;
}

.ticket-title{
font-size:26px;
font-weight:700;
margin:0;
}

.ticket-sub{
font-size:12px;
margin-top:5px;
}

.divider{
width:145px;
height:1px;
background:#bdad82;
margin:10px auto 12px;
}

.ticket-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
}

.field-box{
border:1px solid #d7c79d;
background:#fff;
padding:8px;
height:60px;
}

.field-label{
font-size:10px;
color:#8a7750;
}

.field-value{
font-size:15px;
font-weight:bold;
}

.ticket-bottom{
display:grid;
grid-template-columns:1fr 108px;
gap:12px;
margin-top:10px;
}

.ticket-number-box{
border:2px solid #bdad82;
padding:10px;
text-align:center;
}

.ticket-number{
font-size:18px;
font-weight:bold;
}

.qr-wrap img{
width:98px;
height:98px;
}

.ticket-notes{
text-align:center;
font-size:10px;
margin-top:8px;
}

/* 🔥 FIX */
.cut-line{
position:relative;
height:34px;
border-top:3px dashed #bdad82;
margin-top:16px; /* ↑ 1mm omhoog */
}

.cut-line span{
position:absolute;
left:50%;
top:-11px; /* ↑ 3mm omhoog */
transform:translateX(-50%);
background:transparent;
font-size:26px;
}

/* responsive */
@media(max-width:820px){
body{overflow-x:auto;}
.wrap{width:794px;}
}
</style>
</head>

<body>

<div id="app">laden...</div>

<script>
(function(){
const params=new URLSearchParams(window.location.search);
const ticket=params.get("ticket");
const auto=params.get("pdf");

if(!ticket){
document.getElementById("app").innerHTML="kein ticket";
return;
}

fetch("/api/lookup?ticket="+ticket)
.then(r=>r.json())
.then(data=>{

const url="https://heimat-ticket.vercel.app/ticket.html?ticket="+data.ticket_number;

function qr(u){
return "https://api.qrserver.com/v1/create-qr-code/?size=200x200&data="+encodeURIComponent(u);
}

function block(){
return `
<div class="ticket-half">
<div>
<div class="ticket-header">
<div class="ticket-house">Gasthaus Alt Grieth</div>
<div class="ticket-title">HEIMATLIEDER ABEND</div>
<div class="ticket-sub">Samstag · 6. Juni · 20:00 Uhr</div>
</div>

<div class="divider"></div>

<div class="ticket-grid">
<div class="field-box"><div class="field-label">Vorname</div><div class="field-value">${data.first_name}</div></div>
<div class="field-box"><div class="field-label">Nachname</div><div class="field-value">${data.last_name}</div></div>
<div class="field-box"><div class="field-label">E-Mail</div><div class="field-value">${data.email}</div></div>
<div class="field-box"><div class="field-label">Telefon</div><div class="field-value">${data.phone}</div></div>
<div class="field-box"><div class="field-label">Personen</div><div class="field-value">${data.persons}</div></div>
<div class="field-box"><div class="field-label">Essen</div><div class="field-value">${data.food}</div></div>
</div>
</div>

<div>
<div class="ticket-bottom">
<div class="ticket-number-box">
<div>TICKETNUMMER</div>
<div class="ticket-number">${data.ticket_number}</div>
<div>EINTRITT FREI</div>
</div>

<div class="qr-wrap">
<img src="${qr(url)}">
</div>
</div>

<div class="ticket-notes">
Dieses Ticket sichert einen Sitzplatz an einem Tisch.<br>
Bitte mitbringen.
</div>
</div>
</div>`;
}

document.getElementById("app").innerHTML=`
<div class="wrap">
<div class="sheet" id="pdf">
<div class="inner">
${block()}
<div class="cut-line"><span>✂</span></div>
${block()}
</div>
</div>
</div>
`;

html2canvas(document.getElementById("pdf"),{scale:2}).then(canvas=>{
const img=canvas.toDataURL("image/jpeg",1);
const pdf=new window.jspdf.jsPDF("p","mm","a4");
pdf.addImage(img,"JPEG",0,0,210,297);
pdf.save(data.ticket_number+".pdf");
});

});
})();
</script>

</body>
</html>
