<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Ticket</title>

<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>

<style>
*{box-sizing:border-box;}

body{
margin:0;
font-family:Arial,sans-serif;
background:#f7f2e8;
}

/* ===== PREVIEW FIX ===== */
.wrap{
max-width:900px;
margin:auto;
padding:10px;
}

/* ===== A4 ===== */
.sheet{
width:100%;
aspect-ratio:210/297;
background:#fffdf8;
border:2px solid #bdad82;
position:relative;
overflow:hidden;
}

/* 1CM MARGIN */
.inner{
position:absolute;
inset:38px;
display:flex;
flex-direction:column;
}

/* ===== PERFECT 50/50 ===== */
.ticket{
flex:1;
display:flex;
flex-direction:column;
justify-content:space-between;
padding:14px;
border:1px solid #d7c79d;
background:#fff;
}

/* ===== CUT LINE EXACT MIDDLE ===== */
.cut{
height:0;
border-top:2px dashed #bdad82;
position:relative;
margin:0;
}

.cut span{
position:absolute;
left:50%;
top:-14px;
transform:translateX(-50%);
font-size:26px;
background:#fffdf8;
padding:0 8px;
}

/* ===== HEADER ===== */
.header{
text-align:center;
}

.house{
font-size:10px;
letter-spacing:5px;
color:#8a7750;
}

.title{
font-size:26px;
font-weight:bold;
margin-top:4px;
}

.sub{
font-size:12px;
margin-top:4px;
}

.line{
width:120px;
height:1px;
background:#bdad82;
margin:10px auto;
}

/* ===== GRID ===== */
.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
}

.box{
border:1px solid #d7c79d;
padding:8px;
height:64px;
}

.label{
font-size:10px;
color:#8a7750;
}

.value{
font-size:14px;
font-weight:bold;
}

/* ===== BOTTOM ===== */
.bottom{
display:grid;
grid-template-columns:1fr 100px;
gap:10px;
align-items:center;
margin-top:10px;
}

.number{
border:2px solid #bdad82;
padding:10px;
text-align:center;
}

.qr img{
width:100px;
height:100px;
}

.note{
text-align:center;
font-size:11px;
margin-top:8px;
}

/* ===== BUTTON ===== */
.actions{
text-align:center;
margin-top:10px;
}

button{
padding:10px 18px;
background:#160520;
color:#fff;
border:none;
cursor:pointer;
}

/* ===== MOBILE ===== */
@media(max-width:700px){
.sheet{
transform:scale(0.9);
transform-origin:top center;
}
}
</style>
</head>

<body>

<div class="wrap">
<div id="app">Laden...</div>
</div>

<script>
(function(){

const params=new URLSearchParams(window.location.search);
const ticket=params.get("ticket");
const auto=params.get("pdf");

if(!ticket){
document.getElementById("app").innerHTML="Kein Ticket";
return;
}

fetch("/api/lookup?ticket="+ticket)
.then(r=>r.json())
.then(data=>{

function qr(u){
return "https://api.qrserver.com/v1/create-qr-code/?size=200x200&data="+encodeURIComponent(u);
}

const url="https://heimat-ticket.vercel.app/ticket.html?ticket="+data.ticket_number;

function build(){
return `
<div class="ticket">

<div>
<div class="header">
<div class="house">GASTHAUS ALT GRIETH</div>
<div class="title">HEIMATLIEDER ABEND</div>
<div class="sub">Samstag · 6. Juni · 20:00 Uhr</div>
</div>

<div class="line"></div>

<div class="grid">
<div class="box"><div class="label">Vorname</div><div class="value">${data.first_name}</div></div>
<div class="box"><div class="label">Nachname</div><div class="value">${data.last_name}</div></div>
<div class="box"><div class="label">E-Mail</div><div class="value">${data.email}</div></div>
<div class="box"><div class="label">Telefon</div><div class="value">${data.phone}</div></div>
<div class="box"><div class="label">Personen</div><div class="value">${data.persons}</div></div>
<div class="box"><div class="label">Essen</div><div class="value">${data.food}</div></div>
</div>
</div>

<div>
<div class="bottom">
<div class="number">
<div>TICKETNUMMER</div>
<div>${data.ticket_number}</div>
<div>EINTRITT FREI</div>
</div>

<div class="qr">
<img src="${qr(url)}">
</div>
</div>

<div class="note">
Bitte Ticket digital oder ausgedruckt mitbringen
</div>
</div>

</div>
`;
}

document.getElementById("app").innerHTML=`
<div class="sheet" id="pdf">
<div class="inner">

${build()}

<div class="cut"><span>✂</span></div>

${build()}

</div>
</div>

<div class="actions">
<button onclick="download()">PDF</button>
</div>
`;

window.download=function(){
html2canvas(document.getElementById("pdf"),{scale:2}).then(canvas=>{
const img=canvas.toDataURL("image/jpeg",1);
const pdf=new window.jspdf.jsPDF("p","mm","a4");
pdf.addImage(img,"JPEG",0,0,210,297);
pdf.save(data.ticket_number+".pdf");
});
};

if(auto==="1"){
setTimeout(download,500);
}

});

})();
</script>

</body>
</html>
