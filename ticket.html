<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Heimat Tickets</title>
  <meta name="robots" content="noindex" />
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #fffdf8;
      color: #160520;
    }

    .wrap {
      max-width: 820px;
      margin: 0 auto;
      padding: 20px;
    }

    .ticket-card {
      background: #fff;
      border: 2px solid #bdad82;
      padding: 24px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.06);
    }

    h1 {
      margin: 0 0 16px;
      font-size: 30px;
      text-align: center;
      letter-spacing: 2px;
    }

    .subline {
      text-align: center;
      margin-bottom: 20px;
      color: #6a5a36;
      font-size: 15px;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 18px;
    }

    .box {
      border: 1px solid #bdad82;
      padding: 10px 12px;
      background: #fffdf8;
    }

    .label {
      display: block;
      font-size: 11px;
      letter-spacing: 1px;
      color: #6a5a36;
      margin-bottom: 4px;
      text-transform: uppercase;
    }

    .value {
      font-size: 16px;
      font-weight: 700;
      word-break: break-word;
    }

    .ticket-number {
      border: 2px solid #bdad82;
      padding: 14px;
      text-align: center;
      margin-bottom: 18px;
      background: #fff;
    }

    .ticket-number .label {
      margin-bottom: 6px;
    }

    .ticket-number .value {
      font-size: 22px;
      letter-spacing: 2px;
    }

    .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 20px;
    }

    .btn {
      background: #160520;
      color: #fff;
      border: none;
      padding: 10px 16px;
      cursor: pointer;
      font-size: 14px;
    }

    .btn-secondary {
      background: #bdad82;
      color: #160520;
    }

    .message {
      text-align: center;
      padding: 30px 20px;
      font-size: 16px;
    }

    @media (max-width: 640px) {
      .wrap {
        padding: 12px;
      }

      .ticket-card {
        padding: 16px;
      }

      h1 {
        font-size: 24px;
      }

      .grid {
        grid-template-columns: 1fr;
      }
    }

    @media print {
      .actions {
        display: none;
      }

      body {
        background: #fff;
      }

      .wrap {
        max-width: 100%;
        padding: 0;
      }

      .ticket-card {
        border: none;
        box-shadow: none;
        padding: 0;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div id="app" class="message">Ticket wird geladen...</div>
  </div>

  <script>
    (function () {
      var params = new URLSearchParams(window.location.search);
      var ticket = params.get("ticket");
      var autoPrint = params.get("print");
      var app = document.getElementById("app");

      function esc(value) {
        return String(value == null ? "" : value)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;");
      }

      if (!ticket) {
        app.innerHTML = "Kein Ticket angegeben.";
        return;
      }

      fetch("/api/lookup?ticket=" + encodeURIComponent(ticket))
        .then(function (r) {
          return r.json();
        })
        .then(function (data) {
          if (!data || !data.success) {
            app.innerHTML = "Reservierung nicht gefunden.";
            return;
          }

          var html = "";
          html += "<div class='ticket-card'>";
          html += "<h1>HEIMATLIEDER ABEND</h1>";
          html += "<div class='subline'>Gasthaus Alt Grieth · Samstag, 6. Juni 2026 · 20:00 Uhr</div>";

          html += "<div class='ticket-number'>";
          html += "<span class='label'>Ticketnummer</span>";
          html += "<div class='value'>" + esc(data.ticket_number) + "</div>";
          html += "</div>";

          html += "<div class='grid'>";
          html += "<div class='box'><span class='label'>Vorname</span><div class='value'>" + esc(data.first_name) + "</div></div>";
          html += "<div class='box'><span class='label'>Nachname</span><div class='value'>" + esc(data.last_name) + "</div></div>";
          html += "<div class='box'><span class='label'>E-Mail</span><div class='value'>" + esc(data.email) + "</div></div>";
          html += "<div class='box'><span class='label'>Telefon</span><div class='value'>" + esc(data.phone) + "</div></div>";
          html += "<div class='box'><span class='label'>Personen</span><div class='value'>" + esc(data.persons) + "</div></div>";
          html += "<div class='box'><span class='label'>Essen</span><div class='value'>" + esc(data.food) + "</div></div>";
          html += "<div class='box'><span class='label'>Status</span><div class='value'>" + esc(data.status) + "</div></div>";
          html += "<div class='box'><span class='label'>Veranstaltung</span><div class='value'>Heimatlieder Abend</div></div>";
          html += "</div>";

          html += "<div class='actions'>";
          html += "<button class='btn' onclick='window.print()'>Ticket drucken</button>";
          html += "<button class='btn btn-secondary' onclick='window.history.back()'>Zurück</button>";
          html += "</div>";

          html += "</div>";

          app.className = "";
          app.innerHTML = html;

          if (autoPrint === "1") {
            setTimeout(function () {
              window.print();
            }, 700);
          }
        })
        .catch(function (err) {
          app.innerHTML = "Reservierung konnte nicht geladen werden.<br><br><small>" + esc(err) + "</small>";
        });
    })();
  </script>
</body>
</html>
