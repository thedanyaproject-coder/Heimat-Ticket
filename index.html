<div style="width:100%; max-width:1100px; margin:0 auto; overflow:hidden;">
  <iframe
    id="altgriethTicketFrame"
    src="https://heimat-ticket.vercel.app/"
    style="width:100%; height:1200px; border:0; display:block; overflow:hidden;"
    scrolling="no">
  </iframe>
</div>

<script>
window.addEventListener("message", function(event) {
  if (!event.data || event.data.type !== "altgrieth-ticket-height") return;
  var iframe = document.getElementById("altgriethTicketFrame");
  if (iframe && event.data.height) {
    iframe.style.height = event.data.height + "px";
  }
});
</script>
