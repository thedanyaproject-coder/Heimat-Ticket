<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Gasthaus Alt Grieth – Tickets</title>

<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>

<style>
body{
margin:0;
font-family:Arial;
background:#fffdf8;
color:#160520;
}

.wrap{
max-width:820px;
margin:auto;
padding:10px;
}

/* BUTTONS */
.btn-row{
display:flex;
gap:8px;
margin-bottom:12px;
}
button{
flex:1;
height:38px;
border:none;
font-size:14px;
cursor:pointer;
}
.primary{background:#160520;color:#fff;}
.secondary{background:#bdad82;color:#160520;}

/* TICKET */
.sheet{
width:100%;
max-width:794px;
aspect-ratio:210/297;
margin:auto;
padding:12px;
position:relative;

background:
linear-gradient(rgba(255,251,242,0.97),rgba(255,251,242,0.97)),
url("https://i.postimg.cc/0yKq0kXr/rhein-soft.jpg");

background-size:cover;
background-position:center;

border:2px solid #bdad82;
}

/* HALF */
.ticket{
height:calc((100% - 20px)/2);
display:flex;
flex-direction:column;
justify-content:space-between;
}

/* HEADER */
.header{text-align:center;}
.house{font-size:12px;letter-spacing:4px;color:#6a5a36;}
.title{font-size:26px;font-weight:bold;letter-spacing:2px;}
.event{font-size:14px;letter-spacing:2px;}

/* GRID */
.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:8px;
margin-top:8px;
}
.box{
border:1px solid #bdad82;
padding:6px;
font-size:13px;
}
.label{font-size:10px;color:#6a5a36;letter-spacing:2px;}
.value{font-weight:bold;}

/* FOOT */
.footer{
display:flex;
justify-content:space-between;
align-items:center;
margin-top:6px;
}
.ticketnr{
border:2px solid #bdad82;
padding:10px;
text-align:center;
font-size:18px;
font-weight:bold;
}

.qr img{
width:90px;
}

/* CUT */
.cut{
border-top:2px dashed #bdad82;
margin:10px 0;
position:relative;
}
.cut:after{
content:"✂";
position:absolute;
top:-12px;
left:50%;
transform:translateX(-50%);
background:#fff;
padding:0 6px;
}

/* MOBILE */
@media(max-width:600px){
.grid{grid-template-columns:1fr;}
.ticket{height:auto;}
}
</style>
</head>

<body>

<div class="wrap">

<div class="btn-row">
<button class="primary" onclick="reserve()">Reservieren</button>
<button class="secondary" onclick="downloadPDF()">PDF</button>
</div>

<div class="sheet" id="sheet">

<!-- TOP -->
<div class="ticket">
<div>

<div class="header">
<div class="house">GASTHAUS ALT GRIETH</div>
<div class="title">HEIMATLIEDER ABEND</div>
<div class="event">6. JUNI · 20:00 UHR</div>
</div>

<div class="grid">
<div class="box"><div class="label">Vorname</div><div id="fn"></div></div>
<div class="box"><div class="label">Nachname</div><div id="ln"></div></div>
<div class="box"><div class="label">E-Mail</div><div id="em"></div></div>
<div class="box"><div class="label">Telefon</div><div id="ph"></div></div>
<div class="box"><div class="label">Personen</div><div id="pe"></div></div>
<div class="box"><div class="label">Essen</div><div id="fo"></div></div>
</div>

</div>

<div class="footer">
<div class="ticketnr" id="nr">---</div>
<div class="qr">
<a id="qrLink" target="_blank">
<img id="qr">
</a>
</div>
</div>
</div>

<div class="cut"></div>

<!-- BOTTOM -->
<div class="ticket">
<div>

<div class="header">
<div class="house">GASTHAUS ALT GRIETH</div>
<div class="title">HEIMATLIEDER ABEND</div>
<div class="event">6. JUNI · 20:00 UHR</div>
</div>

<div class="grid">
<div class="box"><div class="label">Vorname</div><div id="fn2"></div></div>
<div class="box"><div class="label">Nachname</div><div id="ln2"></div></div>
<div class="box"><div class="label">E-Mail</div><div id="em2"></div></div>
<div class="box"><div class="label">Telefon</div><div id="ph2"></div></div>
<div class="box"><div class="label">Personen</div><div id="pe2"></div></div>
<div class="box"><div class="label">Essen</div><div id="fo2"></div></div>
</div>

</div>

<div class="footer">
<div class="ticketnr" id="nr2">---</div>
<div class="qr">
<a id="qrLink2" target="_blank">
<img id="qr2">
</a>
</div>
</div>
</div>

</div>

</div>

<script>
let ticketNr="";

function getUrl(data){
return "https://www.altgrieth.de/veranstaltungen/heimat-lieder-abend?ticket="+data.ticket_number;
}

function fill(d){
ticketNr=d.ticket_number;

["fn","fn2"].forEach(id=>document.getElementById(id).innerText=d.first_name);
["ln","ln2"].forEach(id=>document.getElementById(id).innerText=d.last_name);
["em","em2"].forEach(id=>document.getElementById(id).innerText=d.email);
["ph","ph2"].forEach(id=>document.getElementById(id).innerText=d.phone);
["pe","pe2"].forEach(id=>document.getElementById(id).innerText=d.persons);
["fo","fo2"].forEach(id=>document.getElementById(id).innerText=d.food);

["nr","nr2"].forEach(id=>document.getElementById(id).innerText=ticketNr);

let url=getUrl(d);

["qr","qr2"].forEach(id=>{
document.getElementById(id).src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data="+encodeURIComponent(url);
});

["qrLink","qrLink2"].forEach(id=>{
document.getElementById(id).href=url;
});
}

function reserve(){
fetch("/api/reserve?first_name=Test&last_name=Test&email=test@test.de&phone=123&persons=2&food=Ja")
.then(r=>r.json())
.then(d=>{if(d.success){fill(d);}else{alert("Fehler");}});
}

function downloadPDF(){
html2canvas(document.getElementById("sheet"),{scale:2}).then(canvas=>{
const pdf=new jspdf.jsPDF("p","mm","a4");
pdf.addImage(canvas,"JPEG",10,10,190,277);
pdf.save("ticket.pdf");
});
}
</script>

</body>
</html>
