<html lang="de">

  <title>Gasthaus Alt Grieth – Tickets</title>

  <style>

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f8f4ea;
      color: #160520;
    }

    .wrap {
      max-width: 1040px;
      margin: 0 auto;
      padding: 18px 14px 24px;
    }

    .page-topline {
      text-align: center;
      font-size: 12px;
      letter-spacing: 4px;
      color: #8a7750;
      margin-bottom: 8px;
      text-transform: uppercase;
    }

    h1 {
      margin: 0 0 14px;
      text-align: center;
      font-size: 34px;
      line-height: 1.1;
      letter-spacing: 2px;
      color: #160520;
    }

    .intro {
      max-width: 820px;
      margin: 0 auto 22px;
      text-align: center;
      line-height: 1.65;
      font-size: 15px;
      color: #2d1633;
    }

    .status-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      margin-bottom: 20px;
    }

    .status-box {
      border: 2px solid #bdad82;
      background: linear-gradient(180deg, #fffdf8 0%, #f6efdf 100%);
      padding: 16px;
      text-align: center;
      box-shadow: 0 3px 10px rgba(0,0,0,0.04);
    }

    .status-label {
      font-size: 11px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #7a6642;
      margin-bottom: 8px;
    }

    .status-value {
      font-size: 30px;
      font-weight: 700;
      color: #160520;
    }

    .message {
      display: none;
      margin: 0 0 14px;
      padding: 12px 14px;
      border: 1px solid #bdad82;
      background: #fff;
      text-align: center;
      line-height: 1.4;
      box-shadow: 0 2px 8px rgba(0,0,0,0.03);
    }

    .form-box {
      border: 2px solid #bdad82;
      background: linear-gradient(180deg, #fffdf8 0%, #f6efdf 100%);
      padding: 18px;
      box-shadow: 0 3px 10px rgba(0,0,0,0.04);
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px 14px;
    }

    label {
      display: block;
      margin: 0 0 6px;
      font-weight: 700;
      font-size: 14px;
      color: #2d1633;
    }

    input,
    select {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #bdad82;
      font-size: 14px;
      background: #fff;
      color: #160520;
      min-height: 42px;
      outline: none;
    }

    input:focus,
    select:focus {
      border-color: #8f7b56;
      box-shadow: 0 0 0 2px rgba(189,173,130,0.18);
    }

    .btn-row {
      display: flex;
      gap: 10px;
      margin-top: 16px;
    }

    button {
      flex: 1;
      padding: 11px 12px;
      border: none;
      cursor: pointer;
      min-height: 42px;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.3px;
    }

    .btn-primary {
      background: #160520;
      color: #fff;
    }

    .btn-secondary {
      background: #bdad82;
      color: #160520;
    }
