<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gasthaus Alt Grieth – Tickets</title>

<style>
*{box-sizing:border-box;}

body{
margin:0;
font-family:Arial,sans-serif;
background:#f8f4ea;
color:#160520;
}

.wrap{
max-width:1000px;
margin:auto;
padding:18px;
}

h1{
text-align:center;
margin-bottom:16px;
letter-spacing:2px;
}

.intro{
text-align:center;
margin-bottom:20px;
}

.status{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
margin-bottom:20px;
}

.status div{
border:2px solid #bdad82;
padding:12px;
text-align:center;
background:#fff;
}

.form{
border:2px solid #bdad82;
padding:16px;
background:#fff;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
}

input,select{
padding:10px;
border:1px solid #bdad82;
}

.buttons{
display:flex;
gap:10px;
margin-top:12px;
}

button{
flex:1;
padding:10px;
border:none;
cursor:pointer;
}

.primary{
background:#160520;
color:#fff;
}

.secondary{
background:#bdad82;
}

.preview{
margin-top:20px;
}

.sheet{
aspect-ratio:210/297;
border:2px solid #bdad82;
padding:12px;
background:#fff;
}

.half{
height:48%;
}

.cut{
border-top:2px dashed #bdad82;
margin:8px 0;
text-align:center;
}

.box{
border:1px solid #bdad82;
padding:6px;
margin:4px;
}

@media(max-width:700px){
.grid{grid-template-columns:1fr;}
}
</style>
</head>

<body>

<div class="wrap">

<h1>HEIMATLIEDER ABEND</h1>

<div class="intro">
Reserviere deinen Sitzplatz kostenlos
</div>

<div class="status">
<div>Tische frei: <span id="tables">-</span></div>
<div>Plätze frei: <span id="seats">-</span></div>
</div>

<div class="form">

<div class="grid">
<input id="first_name" placeholder="Vorname">
<input id="last_name" placeholder="Nachname">
<input id="email" placeholder="E-Mail">
<input id="phone" placeholder="Telefon">
<input id="persons" type="number" value="1">
<select id="food">
<option>Ja</option>
<option selected>Nein</option>
</select>
</div>

<div class="buttons">
<button class="primary" onclick="reserve()">Reservieren</button>
<button class="secondary" onclick="pdf()">PDF</button>
</div>

</div>

<div class="preview">
<div class="sheet">

<div class="half" id="p1"></div>

<div class="cut">✂</div>

<div class="half" id="p2"></div>

</div>
</div>

</div>

<script>

let lastTicket="";

function fill(d){

let url="https://heimat-ticket.vercel.app/ticket.html?ticket="+d.ticket_number;

function block(){
return `
<div class="box">${d.first_name}</div>
<div class="box">${d.last_name}</div>
<div class="box">${d.email}</div>
<div class="box">${d.phone}</div>
<div class="box">${d.persons}</div>
<div class="box">${d.food}</div>
<div class="box"><b>${d.ticket_number}</b></div>
<img src="https://api.qrserver.com/v1/create-qr-code/?size=120x120&data=${encodeURIComponent(url)}">
`;
}

document.getElementById("p1").innerHTML=block();
document.getElementById("p2").innerHTML=block();
}

function reserve(){

let data={
first_name:first_name.value,
last_name:last_name.value,
email:email.value,
phone:phone.value,
persons:persons.value,
food:food.value
};

fetch("/api/reserve?"+new URLSearchParams(data))
.then(r=>r.json())
.then(res=>{
lastTicket=res.ticket_number;
fill(res);
load();
});
}

function pdf(){
if(!lastTicket){
alert("Eerst reserveren");
return;
}

window.open(
"https://heimat-ticket.vercel.app/ticket.html?ticket="+lastTicket+"&pdf=1",
"_blank"
);
}

function load(){
fetch("/api/status")
.then(r=>r.json())
.then(d=>{
tables.innerText=d.available_tables;
seats.innerText=d.available_seats;
});
}

load();

</script>

</body>
</html>
