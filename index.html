<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gasthaus Alt Grieth – Tickets</title>
<meta name="robots" content="noindex">

<style>
*{box-sizing:border-box;}

body{
margin:0;
font-family:Arial,sans-serif;
background:#fffdf8;
color:#160520;
}

.wrap{
max-width:920px;
margin:auto;
padding:14px;
}

.page-topline{
text-align:center;
font-size:12px;
letter-spacing:4px;
color:#6a5a36;
margin-bottom:8px;
}

h1{
text-align:center;
font-size:32px;
margin:0 0 16px;
}

.intro{
text-align:center;
max-width:760px;
margin:0 auto 20px;
line-height:1.6;
}

.status-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:12px;
margin-bottom:20px;
}

.status-box{
border:2px solid #bdad82;
padding:16px;
text-align:center;
background:#fff;
}

.status-label{
font-size:11px;
letter-spacing:2px;
text-transform:uppercase;
color:#6a5a36;
}

.status-value{
font-size:30px;
font-weight:bold;
}

.form-box{
border:2px solid #bdad82;
padding:18px;
background:#fff;
}

.form-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:12px;
}

input,select{
width:100%;
padding:10px;
border:1px solid #bdad82;
font-size:14px;
}

.btn-row{
display:flex;
gap:10px;
margin-top:14px;
}

button{
flex:1;
padding:10px;
border:none;
cursor:pointer;
}

.btn-primary{
background:#160520;
color:#fff;
}

.btn-secondary{
background:#bdad82;
color:#160520;
}

.preview-title{
text-align:center;
margin:20px 0 10px;
letter-spacing:2px;
}

.sheet{
aspect-ratio:210/297;
background:#fff;
padding:16px;
border:2px solid #bdad82;
}

.ticket-half{
height:50%;
display:flex;
flex-direction:column;
justify-content:space-between;
padding:8px;
}

.ticket-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:6px;
}

.field-box{
border:1px solid #bdad82;
padding:6px;
font-size:12px;
}

.ticket-bottom{
display:grid;
grid-template-columns:1fr 90px;
gap:8px;
align-items:center;
}

.ticket-number-box{
border:2px solid #bdad82;
padding:8px;
text-align:center;
}

.cut-line{
border-top:2px dashed #bdad82;
margin:10px 0;
text-align:center;
}

@media(max-width:720px){
.ticket-grid{grid-template-columns:1fr 1fr;}
}
</style>
</head>

<body>

<div class="wrap">

<div class="page-topline">GASTHAUS ALT GRIETH</div>

<h1>HEIMATLIEDER ABEND</h1>

<div class="intro">
Eintritt frei – Reservierung optional.<br>
Sichern Sie sich einen Sitzplatz am Tisch.
</div>

<div class="status-grid">
<div class="status-box">
<div class="status-label">Tische frei</div>
<div class="status-value" id="availableTables">-</div>
</div>
<div class="status-box">
<div class="status-label">Plätze frei</div>
<div class="status-value" id="availableSeats">-</div>
</div>
</div>

<div class="form-box">
<div class="form-grid">
<input id="first_name" placeholder="Vorname">
<input id="last_name" placeholder="Nachname">
<input id="email" placeholder="E-Mail">
<input id="phone" placeholder="Telefon">
<input id="persons" type="number" value="1">
<select id="food">
<option>Ja</option>
<option selected>Nein</option>
</select>
</div>

<div class="btn-row">
<button class="btn-primary" onclick="reserve()">Reservieren</button>
<button class="btn-secondary" onclick="openTicket()">Ticket öffnen</button>
</div>
</div>

<div class="preview-title">VORSCHAU</div>

<div class="sheet" id="ticket">

<div class="ticket-half">
<div class="ticket-grid">
<div class="field-box" id="t1_first_name"></div>
<div class="field-box" id="t1_last_name"></div>
<div class="field-box" id="t1_email"></div>
<div class="field-box" id="t1_phone"></div>
<div class="field-box" id="t1_persons"></div>
<div class="field-box" id="t1_food"></div>
</div>

<div class="ticket-bottom">
<div class="ticket-number-box" id="t1_number"></div>
<img id="t1_qr">
</div>
</div>

<div class="cut-line">✂</div>

<div class="ticket-half">
<div class="ticket-grid">
<div class="field-box" id="t2_first_name"></div>
<div class="field-box" id="t2_last_name"></div>
<div class="field-box" id="t2_email"></div>
<div class="field-box" id="t2_phone"></div>
<div class="field-box" id="t2_persons"></div>
<div class="field-box" id="t2_food"></div>
</div>

<div class="ticket-bottom">
<div class="ticket-number-box" id="t2_number"></div>
<img id="t2_qr">
</div>
</div>

</div>

</div>

<script>

let latestTicket="";

function fill(data){

let url="https://www.altgrieth.de/heimat-tickets?ticket="+data.ticket_number;

["t1","t2"].forEach(p=>{
document.getElementById(p+"_first_name").innerText=data.first_name;
document.getElementById(p+"_last_name").innerText=data.last_name;
document.getElementById(p+"_email").innerText=data.email;
document.getElementById(p+"_phone").innerText=data.phone;
document.getElementById(p+"_persons").innerText=data.persons;
document.getElementById(p+"_food").innerText=data.food;
document.getElementById(p+"_number").innerText=data.ticket_number;

document.getElementById(p+"_qr").src=
"https://api.qrserver.com/v1/create-qr-code/?size=150x150&data="+encodeURIComponent(url);
});
}

function reserve(){

let data={
first_name:first_name.value,
last_name:last_name.value,
email:email.value,
phone:phone.value,
persons:persons.value,
food:food.value
};

fetch("/api/reserve?"+new URLSearchParams(data))
.then(r=>r.json())
.then(res=>{
latestTicket=res.ticket_number;
fill(res);
loadStatus();
});
}

function openTicket(){
if(!latestTicket){
alert("Eerst reserveren");
return;
}

window.open(
"https://www.altgrieth.de/heimat-tickets?ticket="+latestTicket+"&print=1",
"_blank"
);
}

function loadStatus(){
fetch("/api/status")
.then(r=>r.json())
.then(d=>{
availableTables.innerText=d.available_tables;
availableSeats.innerText=d.available_seats;
});
}

window.onload=loadStatus;

</script>

</body>
</html>
