<html lang="de">
<head>

  padding:16px;
}

.topline{

  padding:14px;
  text-align:center;
}

.status-label{

.status-value{

  font-size:14px;
  font-weight:700;

  color:#160520;
  font-size:14px;
}

.btn-row{
  display:flex;
  gap:10px;
  margin-top:14px;
}

button{
  flex:1;
  min-height:42px;
  border:none;
  cursor:pointer;
  font-size:14px;
  font-weight:700;
}

.btn-primary{
  background:#160520;
  color:#fff;
}

.btn-secondary{
  background:#bdad82;
  color:#160520;
}

.preview-title{

}
