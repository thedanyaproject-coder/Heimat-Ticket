<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Gasthaus Alt Grieth – Tickets</title>
<meta name="robots" content="noindex" />
<style>
*{box-sizing:border-box;}

body{
margin:0;
font-family:Arial,sans-serif;
background:#f7f2e8;
color:#160520;
}

.wrap{
max-width:1000px;
margin:0 auto;
padding:16px;
}

.topline{
text-align:center;
font-size:12px;
letter-spacing:4px;
color:#7a6a48;
text-transform:uppercase;
margin-bottom:8px;
}

h1{
margin:0 0 14px;
text-align:center;
font-size:30px;
letter-spacing:2px;
}

.intro{
max-width:760px;
margin:0 auto 18px;
text-align:center;
line-height:1.6;
font-size:15px;
}

.status-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:12px;
margin-bottom:18px;
}

.status-box{
background:#fff;
border:2px solid #bdad82;
padding:14px;
text-align:center;
}

.status-label{
font-size:11px;
letter-spacing:2px;
text-transform:uppercase;
color:#7a6a48;
margin-bottom:6px;
}

.status-value{
font-size:28px;
font-weight:700;
}

.message{
display:none;
margin-bottom:14px;
padding:12px;
border:1px solid #bdad82;
background:#fff;
text-align:center;
line-height:1.4;
}

.form-box{
background:#fff;
border:2px solid #bdad82;
padding:16px;
}

.form-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:12px 14px;
}

label{
display:block;
margin-bottom:6px;
font-size:14px;
font-weight:700;
}

input,select{
width:100%;
min-height:42px;
padding:10px 12px;
border:1px solid #bdad82;
background:#fff;
color:#160520;
font-size:14px;
}

.btn-row{
display:flex;
gap:10px;
margin-top:14px;
}

button{
flex:1;
min-height:42px;
border:none;
cursor:pointer;
font-size:14px;
font-weight:700;
}

.btn-primary{
background:#160520;
color:#fff;
}

.btn-secondary{
background:#bdad82;
color:#160520;
}

.preview-title{
text-align:center;
margin:22px 0 10px;
letter-spacing:2px;
font-size:18px;
text-transform:uppercase;
}

.preview-holder{
width:100%;
overflow:auto;
}

.preview-scale{
width:794px;
margin:0 auto;
transform:scale(0.62);
transform-origin:top center;
}

.preview-spacer{
height:700px;
}

.sheet{
width:794px;
height:1123px;
background:#fffdf8;
border:2px solid #bdad82;
position:relative;
overflow:hidden;
}

.inner{
position:absolute;
left:38px;
right:38px;
top:38px;
bottom:38px;
border:1px solid #d7c79d;
padding:14px;
background:
linear-gradient(rgba(255,251,242,0.96), rgba(255,251,242,0.96)),
url("https://i.postimg.cc/0yKq0kXr/rhein-soft.jpg");
background-size:cover;
background-position:center;
display:grid;
grid-template-rows:1fr 34px 1fr;
}

.ticket-half{
background:#fff;
border:1px solid #d7c79d;
padding:12px 14px 10px;
display:flex;
flex-direction:column;
justify-content:space-between;
min-height:0;
}

.ticket-header{
text-align:center;
margin-bottom:6px;
}

.ticket-house{
font-size:10px;
letter-spacing:5px;
text-transform:uppercase;
color:#8a7750;
margin-bottom:5px;
line-height:1.1;
}

.ticket-title{
font-size:26px;
font-weight:700;
letter-spacing:1px;
line-height:1.05;
margin:0;
}

.ticket-sub{
font-size:12px;
line-height:1.2;
margin-top:5px;
}

.divider{
width:145px;
height:1px;
background:#bdad82;
margin:10px auto 12px;
}

.ticket-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
margin-bottom:8px;
}

.field-box{
border:1px solid #d7c79d;
background:#fff;
padding:8px 10px;
height:60px;
display:flex;
flex-direction:column;
justify-content:flex-start;
min-height:0;
}

.field-label{
font-size:10px;
text-transform:uppercase;
color:#8a7750;
margin-bottom:4px;
line-height:1.1;
}

.field-value{
font-size:15px;
font-weight:700;
line-height:1.2;
word-break:break-word;
}

.ticket-bottom{
display:grid;
grid-template-columns:1fr 108px;
gap:12px;
align-items:stretch;
margin-top:10px;
}

.ticket-number-box{
border:2px solid #bdad82;
background:#fff;
padding:10px;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
text-align:center;
min-height:108px;
}

.ticket-number-label{
font-size:10px;
text-transform:uppercase;
color:#8a7750;
margin-bottom:6px;
line-height:1.1;
}

.ticket-number{
font-size:18px;
font-weight:700;
line-height:1.2;
word-break:break-word;
}

.free-line{
font-size:12px;
font-weight:700;
margin-top:7px;
line-height:1.1;
}

.qr-wrap{
display:flex;
align-items:center;
justify-content:center;
border:1px solid #d7c79d;
background:#fff;
min-height:108px;
}

.qr-wrap img{
width:98px;
height:98px;
display:block;
}

.ticket-notes{
text-align:center;
font-size:10px;
line-height:1.2;
margin-top:10px;
min-height:26px;
}

.cut-line{
position:relative;
height:34px;
border-top:3px dashed #bdad82;
}

.cut-line span{
position:absolute;
left:50%;
top:-18px;
transform:translateX(-50%);
background:#fffdf8;
padding:0 8px;
font-size:30px;
line-height:1;
}

@media(max-width:900px){
.preview-scale{
transform:scale(0.5);
}
.preview-spacer{
height:575px;
}
}

@media(max-width:820px){
.status-grid,.form-grid{
grid-template-columns:1fr;
}
.preview-scale{
transform:scale(0.42);
}
.preview-spacer{
height:480px;
}
}
</style>
</head>
<body>
<div class="wrap">
  <div class="topline">GASTHAUS ALT GRIETH</div>
  <h1>HEIMATLIEDER ABEND – TICKETS</h1>

  <div class="intro">
    Der Eintritt ist frei. Wer sich einen Sitzplatz an einem Tisch sichern möchte, kann hier kostenlos ein Ticket bestellen.
  </div>

  <div class="status-grid">
    <div class="status-box">
      <div class="status-label">Tische frei</div>
      <div class="status-value" id="availableTables">-</div>
    </div>
    <div class="status-box">
      <div class="status-label">Plätze frei</div>
      <div class="status-value" id="availableSeats">-</div>
    </div>
  </div>

  <div class="message" id="messageBox"></div>

  <div class="form-box">
    <div class="form-grid">
      <div>
        <label for="first_name">Vorname</label>
        <input id="first_name" placeholder="Vorname">
      </div>
      <div>
        <label for="last_name">Nachname</label>
        <input id="last_name" placeholder="Nachname">
      </div>
      <div>
        <label for="email">E-Mail</label>
        <input id="email" placeholder="E-Mail">
      </div>
      <div>
        <label for="phone">Telefon</label>
        <input id="phone" placeholder="Telefon">
      </div>
      <div>
        <label for="persons">Personen</label>
        <input id="persons" type="number" value="1" min="1">
      </div>
      <div>
        <label for="food">Essen</label>
        <select id="food">
          <option value="Ja">Ja</option>
          <option value="Nein" selected>Nein</option>
        </select>
      </div>
    </div>

    <div class="btn-row">
      <button class="btn-primary" id="reserveBtn" type="button">Reservieren</button>
      <button class="btn-secondary" id="pdfBtn" type="button">Erneut PDF laden</button>
    </div>
  </div>

  <div class="preview-title">Vorschau</div>

  <div class="preview-holder">
    <div class="preview-scale">
      <div class="sheet">
        <div class="inner">
          <div id="previewTop" class="ticket-half"></div>
          <div class="cut-line"><span>✂</span></div>
          <div id="previewBottom" class="ticket-half"></div>
        </div>
      </div>
    </div>
    <div class="preview-spacer"></div>
  </div>
</div>

<script>
let latestTicket = "";

function esc(value) {
  return String(value == null ? "" : value)
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;");
}

function showMessage(text, isError) {
  const box = document.getElementById("messageBox");
  box.style.display = "block";
  box.textContent = text;
  box.style.borderColor = isError ? "#b94a48" : "#bdad82";
  box.style.background = isError ? "#fff4f4" : "#fff";
}

function setStatus(tables, seats) {
  document.getElementById("availableTables").textContent = tables;
  document.getElementById("availableSeats").textContent = seats;
}

function getTicketUrl(ticketNumber) {
  return "https://heimat-ticket.vercel.app/ticket.html?ticket=" + encodeURIComponent(ticketNumber || "");
}

function qr(url) {
  return "https://api.qrserver.com/v1/create-qr-code/?size=220x220&data=" + encodeURIComponent(url);
}

function buildHalf(data) {
  const url = getTicketUrl(data.ticket_number || "");
  return `
    <div>
      <div class="ticket-header">
        <div class="ticket-house">Gasthaus Alt Grieth</div>
        <div class="ticket-title">HEIMATLIEDER ABEND</div>
        <div class="ticket-sub">Samstag · 6. Juni · 20:00 Uhr</div>
      </div>

      <div class="divider"></div>

      <div class="ticket-grid">
        <div class="field-box">
          <div class="field-label">Vorname</div>
          <div class="field-value">${esc(data.first_name)}</div>
        </div>
        <div class="field-box">
          <div class="field-label">Nachname</div>
          <div class="field-value">${esc(data.last_name)}</div>
        </div>
        <div class="field-box">
          <div class="field-label">E-Mail</div>
          <div class="field-value">${esc(data.email)}</div>
        </div>
        <div class="field-box">
          <div class="field-label">Telefon</div>
          <div class="field-value">${esc(data.phone)}</div>
        </div>
        <div class="field-box">
          <div class="field-label">Personen</div>
          <div class="field-value">${esc(data.persons)}</div>
        </div>
        <div class="field-box">
          <div class="field-label">Essen</div>
          <div class="field-value">${esc(data.food)}</div>
        </div>
      </div>
    </div>

    <div>
      <div class="ticket-bottom">
        <div class="ticket-number-box">
          <div class="ticket-number-label">Ticketnummer</div>
          <div class="ticket-number">${esc(data.ticket_number || "WIRD BEI RESERVIERUNG VERGEBEN")}</div>
          <div class="free-line">EINTRITT FREI</div>
        </div>

        <div class="qr-wrap">
          <img src="${qr(url)}" alt="QR Code">
        </div>
      </div>

      <div class="ticket-notes">
        Dieses Ticket sichert einen Sitzplatz an einem Tisch.<br>
        Bitte bringen Sie dieses Ticket digital oder ausgedruckt mit.
      </div>
    </div>
  `;
}

function fillPreview(data) {
  document.getElementById("previewTop").innerHTML = buildHalf(data);
  document.getElementById("previewBottom").innerHTML = buildHalf(data);
}

function loadStatus() {
  fetch("/api/status")
    .then(r => r.json())
    .then(d => {
      if (d && d.success) {
        setStatus(d.available_tables, d.available_seats);
      }
    });
}

function openPdf(ticketNumber) {
  const pdfUrl = "https://heimat-ticket.vercel.app/ticket.html?ticket=" + encodeURIComponent(ticketNumber) + "&pdf=1";
  window.open(pdfUrl, "_blank");
}

function reserve() {
  const data = {
    first_name: document.getElementById("first_name").value,
    last_name: document.getElementById("last_name").value,
    email: document.getElementById("email").value,
    phone: document.getElementById("phone").value,
    persons: document.getElementById("persons").value,
    food: document.getElementById("food").value
  };

  fetch("/api/reserve?" + new URLSearchParams(data).toString())
    .then(r => r.json())
    .then(res => {
      if (!res || !res.success) {
        showMessage((res && res.message) ? res.message : "Reservierung fehlgeschlagen.", true);
        return;
      }

      latestTicket = res.ticket_number;
      fillPreview(res);
      loadStatus();
      showMessage("Reservierung erfolgreich. Ticketnummer: " + res.ticket_number, false);

      setTimeout(function () {
        openPdf(latestTicket);
      }, 250);
    })
    .catch(() => {
      showMessage("Verbindung zum Reservierungssystem fehlgeschlagen.", true);
    });
}

function downloadPdfAgain() {
  if (!latestTicket) {
    showMessage("Bitte zuerst reservieren.", true);
    return;
  }
  openPdf(latestTicket);
}

window.addEventListener("load", function() {
  fillPreview({
    first_name: "Vorname",
    last_name: "Nachname",
    email: "beispiel@email.de",
    phone: "0123456789",
    persons: "2",
    food: "Ja",
    ticket_number: "WIRD BEI RESERVIERUNG VERGEBEN"
  });
  loadStatus();
  document.getElementById("reserveBtn").addEventListener("click", reserve);
  document.getElementById("pdfBtn").addEventListener("click", downloadPdfAgain);
});
</script>
</body>
</html>
