<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Gasthaus Alt Grieth – Tickets</title>

<style>
body{font-family:Arial;padding:20px;background:#f7f2e8;color:#160520}
input,select{width:100%;padding:10px;margin-bottom:10px}
button{padding:10px;width:100%;margin-top:10px}
</style>
</head>

<body>

<h2>Heimatlieder Abend – Reservierung</h2>

<input id="first_name" placeholder="Vorname">
<input id="last_name" placeholder="Nachname">
<input id="email" placeholder="E-Mail">
<input id="phone" placeholder="Telefon">
<input id="persons" type="number" value="1">
<select id="food">
<option>Ja</option>
<option selected>Nein</option>
</select>

<button onclick="reserve()">Reservieren</button>

<script>
function getPublicTicketUrl(ticket){
return "https://www.altgrieth.de/heimat-tickets?ticket="+ticket;
}

function reserve(){
let data={
first_name:document.getElementById("first_name").value,
last_name:document.getElementById("last_name").value,
email:document.getElementById("email").value,
phone:document.getElementById("phone").value,
persons:document.getElementById("persons").value,
food:document.getElementById("food").value
};

fetch("/api/reserve?"+new URLSearchParams(data))
.then(r=>r.json())
.then(res=>{
if(!res.success){
alert("Fehler bij reservering");
return;
}

alert("Reservierung erfolgreich: "+res.ticket_number);

// 👉 open via jouw domein (niet vercel)
window.open(getPublicTicketUrl(res.ticket_number),"_blank");
});
}
</script>

</body>
</html>
