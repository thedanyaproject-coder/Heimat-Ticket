<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Heimatlieder Abend – Reservierung</title>
  <style>
    :root{
      --bg:#f8f4ea;
      --paper:#fffdf8;
      --text:#160520;
      --gold:#bdad82;
      --line:#e5d7b5;
    }

    *{box-sizing:border-box;}

    body{
      margin:0;
      font-family:Actor, Arial, sans-serif;
      background:var(--bg);
      color:var(--text);
    }

    .wrap{
      max-width:960px;
      margin:0 auto;
      padding:24px 16px 40px;
    }

    .card{
      background:var(--paper);
      border:2px solid var(--gold);
      padding:24px 20px;
      margin-bottom:22px;
    }

    h1{
      margin:0 0 8px;
      text-align:center;
      font-size:34px;
      line-height:1.1;
      text-transform:uppercase;
      letter-spacing:1px;
    }

    .sub{
      margin:0;
      text-align:center;
      font-size:18px;
      font-weight:700;
    }

    .statusbox{
      display:flex;
      justify-content:center;
      align-items:center;
      gap:12px;
      flex-wrap:wrap;
      text-align:center;
      font-size:18px;
    }

    .badge{
      display:inline-block;
      padding:10px 14px;
      border:2px solid var(--gold);
      background:#fff;
      font-weight:700;
      min-width:110px;
    }

    .info{
      text-align:center;
      line-height:1.7;
      font-size:16px;
    }

    .frame-wrap{
      overflow:hidden;
      border:1px solid var(--line);
      background:#fff;
    }

    iframe{
      width:100%;
      height:1180px;
      border:0;
      display:block;
      background:#fff;
    }

    @media (max-width:768px){
      .wrap{padding:16px 12px 26px;}
      h1{font-size:26px;}
      .sub{font-size:16px;}
      .statusbox{font-size:16px;}
      iframe{height:1320px;}
    }
  </style>
</head>
<body>
  <div class="wrap">
    <section class="card">
      <h1>HEIMATLIEDER ABEND</h1>
      <p class="sub">Freitag, 6. Juni · Beginn 20:00 Uhr</p>
    </section>

    <section class="card">
      <div class="statusbox">
        <span>Aktuell verfügbar:</span>
        <span class="badge" id="seats">...</span>
      </div>
    </section>

    <section class="card">
      <div class="info">
        Bitte wählen Sie unten Ihre Plätze aus und folgen Sie den weiteren Schritten.
      </div>
    </section>

    <section class="card frame-wrap">
      <iframe src="/app.html" title="Reservierungssystem"></iframe>
    </section>
  </div>

  <script>
    async function loadStatus(){
      try{
        const res = await fetch('/api/status', {cache:'no-store'});
        const data = await res.json();
        const seats = document.getElementById('seats');
        if(typeof data.available !== 'undefined'){
          seats.textContent = data.available + ' Plätze';
        }else if(typeof data.remaining !== 'undefined'){
          seats.textContent = data.remaining + ' Plätze';
        }else{
          seats.textContent = 'Verfügbar';
        }
      }catch(e){
        document.getElementById('seats').textContent = 'Bitte später erneut prüfen';
      }
    }
    loadStatus();
  </script>
</body>
</html>
