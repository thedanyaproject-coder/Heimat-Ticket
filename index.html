<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ticket – Alt Grieth</title>

<style>
body{
  font-family: Arial, sans-serif;
  background:#fffdf8;
  margin:0;
  color:#160520;
}

/* CONTAINER */
.wrap{
  max-width:800px;
  margin:0 auto;
  padding:20px;
}

/* BUTTONS */
.btns{
  display:flex;
  gap:10px;
  margin-bottom:15px;
}
button{
  flex:1;
  height:44px;
  font-size:14px;
  border:none;
  cursor:pointer;
}
.primary{background:#160520;color:#fff;}
.secondary{background:#bdad82;color:#160520;}

/* TICKET */
.ticket{
  width:100%;
  max-width:794px; /* A4 */
  margin:0 auto;
  border:2px solid #bdad82;
  background:white;
  position:relative;
  overflow:hidden;
}

/* WATERMARK */
.ticket::before{
  content:"ALT GRIETH";
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  font-size:80px;
  opacity:0.05;
  letter-spacing:10px;
}

/* HEADER */
.header{
  text-align:center;
  padding:20px;
}
.header h1{
  margin:0;
  font-size:26px;
  letter-spacing:3px;
}
.sub{
  font-size:14px;
  letter-spacing:2px;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  padding:20px;
}
.field{
  border:1px solid #bdad82;
  padding:10px;
}
.label{
  font-size:11px;
  letter-spacing:2px;
  color:#666;
}
.value{
  font-weight:bold;
}

/* FULL WIDTH */
.full{
  grid-column:1 / -1;
}

/* TICKET NUMBER */
.ticket-number-box{
  border:2px solid #bdad82;
  margin:20px;
  padding:15px;
  text-align:center;
}
.ticket-number{
  font-size:22px;
  font-weight:bold;
}

/* QR */
.qr{
  text-align:center;
  padding:10px;
}
.qr img{
  width:120px;
}

/* CUT LINE */
.cut{
  border-top:2px dashed #bdad82;
  margin-top:20px;
  position:relative;
}
.cut:after{
  content:"✂";
  position:absolute;
  left:50%;
  top:-14px;
  transform:translateX(-50%);
  background:#fffdf8;
  padding:0 5px;
}

/* TEAR OFF */
.tear{
  padding:15px;
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  font-size:12px;
}

/* PRINT */
@media print{
  body *{visibility:hidden;}
  .ticket, .ticket *{visibility:visible;}
  .ticket{
    position:absolute;
    top:0;
    left:0;
    width:100%;
    height:100%;
  }
}
</style>
</head>

<body>

<div class="wrap">

<div class="btns">
  <button class="primary" onclick="reserve()">Reservieren</button>
  <button class="secondary" onclick="window.print()">PDF drucken</button>
</div>

<div class="ticket">

<div class="header">
  <div class="sub">GASTHAUS ALT GRIETH</div>
  <h1>HEIMATLIEDER ABEND</h1>
  <div>6. Juni · 20:00 Uhr</div>
</div>

<div class="grid">

<div class="field">
<div class="label">Vorname</div>
<div class="value" id="fn"></div>
</div>

<div class="field">
<div class="label">Nachname</div>
<div class="value" id="ln"></div>
</div>

<div class="field">
<div class="label">E-Mail</div>
<div class="value" id="em"></div>
</div>

<div class="field">
<div class="label">Telefon</div>
<div class="value" id="ph"></div>
</div>

<div class="field">
<div class="label">Personen</div>
<div class="value" id="pe"></div>
</div>

<div class="field">
<div class="label">Essen</div>
<div class="value" id="fo"></div>
</div>

<div class="field full">
<div class="label">Ticketnummer</div>
<div class="value" id="tn">WIRD VERGEBEN</div>
</div>

</div>

<div class="ticket-number-box">
<div>Ticketnummer</div>
<div class="ticket-number" id="tn2">WIRD VERGEBEN</div>
</div>

<div class="qr">
<img id="qr">
</div>

<div class="cut"></div>

<!-- Afscheurstrook -->
<div class="tear">
<div><b>Name:</b> <span id="t_name"></span></div>
<div><b>Personen:</b> <span id="t_pe"></span></div>
<div><b>Essen:</b> <span id="t_fo"></span></div>
<div><b>Ticket:</b> <span id="t_tn"></span></div>
</div>

</div>

</div>

<script>
function reserve(){

let url="/api/reserve?first_name=Frank&last_name=Bouwman&email=test@test.nl&phone=123&persons=2&food=Ja";

fetch(url)
.then(r=>r.json())
.then(d=>{
if(d.success){

document.getElementById("tn").innerText=d.ticket_number;
document.getElementById("tn2").innerText=d.ticket_number;

document.getElementById("fn").innerText=d.first_name;
document.getElementById("ln").innerText=d.last_name;
document.getElementById("em").innerText=d.email;
document.getElementById("ph").innerText=d.phone;
document.getElementById("pe").innerText=d.persons;
document.getElementById("fo").innerText=d.food;

document.getElementById("t_name").innerText=d.first_name+" "+d.last_name;
document.getElementById("t_pe").innerText=d.persons;
document.getElementById("t_fo").innerText=d.food;
document.getElementById("t_tn").innerText=d.ticket_number;

document.getElementById("qr").src=
"https://api.qrserver.com/v1/create-qr-code/?size=150x150&data="+d.ticket_number;

}else{
alert("Reservierung nicht möglich");
}
});
}
</script>

</body>
</html>
