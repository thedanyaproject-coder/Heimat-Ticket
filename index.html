<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Gasthaus Alt Grieth – Ticket</title>

<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>

<style>
body{
margin:0;
background:#fffdf8;
font-family:Arial;
color:#160520;
}

.wrap{
max-width:820px;
margin:auto;
padding:14px;
}

/* BUTTONS */
.btn-row{
display:flex;
gap:8px;
margin-bottom:12px;
}
button{
flex:1;
height:38px;
border:none;
font-size:14px;
cursor:pointer;
}
.primary{background:#160520;color:#fff;}
.secondary{background:#bdad82;color:#160520;}

/* SHEET */
.sheet{
border:2px solid #bdad82;
padding:12px;
background:#fff;
}

/* TICKET HALF */
.ticket{
display:flex;
flex-direction:column;
justify-content:space-between;
height:520px;
}

/* HEADER */
.header{
text-align:center;
}
.house{
font-size:12px;
letter-spacing:4px;
color:#6a5a36;
}
.title{
font-size:26px;
font-weight:bold;
letter-spacing:2px;
}
.event{
font-size:14px;
letter-spacing:2px;
}

/* GRID */
.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:8px;
margin-top:10px;
}
.box{
border:1px solid #bdad82;
padding:6px;
font-size:13px;
}
.label{
font-size:10px;
letter-spacing:2px;
color:#6a5a36;
}
.value{
font-weight:bold;
}

/* FOOTER */
.footer{
display:flex;
justify-content:space-between;
align-items:center;
margin-top:10px;
}
.ticketnr{
border:2px solid #bdad82;
padding:10px;
text-align:center;
font-weight:bold;
font-size:18px;
}

/* QR */
.qr img{
width:100px;
}

/* CUT LINE */
.cut{
border-top:2px dashed #bdad82;
margin:10px 0;
position:relative;
}
.cut:after{
content:"✂";
position:absolute;
top:-12px;
left:50%;
transform:translateX(-50%);
background:#fff;
padding:0 6px;
}

/* MOBILE */
@media(max-width:600px){
.grid{grid-template-columns:1fr;}
.ticket{height:auto;}
}
</style>
</head>

<body>

<div class="wrap">

<div class="btn-row">
<button class="primary" onclick="reserve()">Reservieren</button>
<button class="secondary" onclick="downloadPDF()">PDF</button>
</div>

<div class="sheet" id="sheet">

<!-- TOP -->
<div class="ticket">
<div>

<div class="header">
<div class="house">GASTHAUS ALT GRIETH</div>
<div class="title">HEIMATLIEDER ABEND</div>
<div class="event">6. JUNI · 20:00 UHR</div>
</div>

<div class="grid">
<div class="box"><div class="label">Vorname</div><div id="fn"></div></div>
<div class="box"><div class="label">Nachname</div><div id="ln"></div></div>
<div class="box"><div class="label">E-Mail</div><div id="em"></div></div>
<div class="box"><div class="label">Telefon</div><div id="ph"></div></div>
<div class="box"><div class="label">Personen</div><div id="pe"></div></div>
<div class="box"><div class="label">Essen</div><div id="fo"></div></div>
</div>

</div>

<div class="footer">
<div class="ticketnr" id="nr">---</div>
<div class="qr"><img id="qr"></div>
</div>
</div>

<div class="cut"></div>

<!-- BOTTOM (DUPLICAAT + ALLE DATA) -->
<div class="ticket">
<div>

<div class="header">
<div class="house">GASTHAUS ALT GRIETH</div>
<div class="title">HEIMATLIEDER ABEND</div>
<div class="event">6. JUNI · 20:00 UHR</div>
</div>

<div class="grid">
<div class="box"><div class="label">Vorname</div><div id="fn2"></div></div>
<div class="box"><div class="label">Nachname</div><div id="ln2"></div></div>
<div class="box"><div class="label">E-Mail</div><div id="em2"></div></div>
<div class="box"><div class="label">Telefon</div><div id="ph2"></div></div>
<div class="box"><div class="label">Personen</div><div id="pe2"></div></div>
<div class="box"><div class="label">Essen</div><div id="fo2"></div></div>
<div class="box"><div class="label">Ticketnummer</div><div id="nr2"></div></div>
</div>

</div>

<div class="footer">
<div class="qr"><img id="qr2"></div>
</div>
</div>

</div>

</div>

<script>
let ticketNr="---";

function fill(d){
document.getElementById("fn").innerText=d.first_name||"-";
document.getElementById("ln").innerText=d.last_name||"-";
document.getElementById("em").innerText=d.email||"-";
document.getElementById("ph").innerText=d.phone||"-";
document.getElementById("pe").innerText=d.persons||"1";
document.getElementById("fo").innerText=d.food||"Nein";

document.getElementById("fn2").innerText=d.first_name||"-";
document.getElementById("ln2").innerText=d.last_name||"-";
document.getElementById("em2").innerText=d.email||"-";
document.getElementById("ph2").innerText=d.phone||"-";
document.getElementById("pe2").innerText=d.persons||"1";
document.getElementById("fo2").innerText=d.food||"Nein";

ticketNr=d.ticket_number||"---";

document.getElementById("nr").innerText=ticketNr;
document.getElementById("nr2").innerText=ticketNr;

let qr="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data="+encodeURIComponent(ticketNr);
document.getElementById("qr").src=qr;
document.getElementById("qr2").src=qr;
}

function reserve(){
fetch("/api/reserve?first_name=Test&last_name=Test&email=test@test.de&phone=123&persons=2&food=Ja")
.then(r=>r.json())
.then(d=>{if(d.success){fill(d);}else{alert("Fehler");}});
}

function downloadPDF(){
html2canvas(document.getElementById("sheet"),{scale:2}).then(canvas=>{
const pdf=new jspdf.jsPDF("p","mm","a4");
const w=210;
const h=canvas.height*w/canvas.width;
pdf.addImage(canvas,"JPEG",0,0,w,h);
pdf.save("ticket.pdf");
});
}
</script>

</body>
</html>
